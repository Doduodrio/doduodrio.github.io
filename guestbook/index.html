        <link rel="preconnect" href="https://fonts.googleapis.com">

    <body>
        <div class="content">
            <div class="sidebar">
                <div class="sidebar-top">
                    <div class="icon">
                        <img class="icon" src="../hey.png" alt="hey">
                        <img class="icon wink" src="../hey_wink.png" alt="hey_wink">

                </div>

                <hr>

                    <h3>SIGN THE GUESTBOOK</h3>

                    <h3>MESSAGES</h3>

                        <div class="guestbook-post">
